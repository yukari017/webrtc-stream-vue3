<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/vite.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="WebRTC 通信系统 - 实时音视频推流与观看">
    <meta name="theme-color" content="#fb7299">
    <title>WebRTC 通信系统</title>
    
    <!-- 异步加载 FontAwesome CSS (不阻塞渲染) -->
    <link rel="preload" href="/fonts/fontawesome.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/fonts/fontawesome.css"></noscript>
    
    <!-- 预加载关键资源 -->
    <link rel="modulepreload" href="/src/main.ts">
    
    <!-- 关键 CSS 内联 -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html {
        -webkit-text-size-adjust: 100%;
        height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #f5f5f5;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        height: 100%;
      }
      #app {
        height: 100%;
      }
      
      /* 移动端隐藏滚动条 - 通过 JS 添加 is-mobile 类 */
      html.is-mobile, html.is-mobile body, html.is-mobile #app {
        overflow: hidden;
      }
      
      /* 字体加载时的回退样式 */
      .fa, .fas, .far, .fab {
        display: inline-block;
        width: 1.25em;
        text-align: center;
      }
      
      /* 骨架屏 */
      .skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s infinite;
      }
      @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      /* 首屏加载占位 */
      .app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .app-loading-title {
        font-size: 24px;
        font-weight: 700;
        background: linear-gradient(135deg, #fb7299 0%, #fc8bab 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 16px;
      }
      .app-loading-subtitle {
        color: #8b9dc3;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- 首屏骨架屏 -->
      <div class="app-loading">
        <div class="app-loading-title">WebRTC 通信系统</div>
        <div class="app-loading-subtitle">正在加载...</div>
      </div>
    </div>
    
    <!-- 检测移动设备并添加类名 -->
    <script>
      (function() {
        const isMobile = /Mobi|Android|iPhone|iPad|iPod|Windows Phone|webOS|BlackBerry/i.test(navigator.userAgent);
        const isMobileScreen = Math.min(window.innerWidth, window.innerHeight) < 768;
        if (isMobile || isMobileScreen) {
          document.documentElement.classList.add('is-mobile');
        }
      })();
    </script>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
