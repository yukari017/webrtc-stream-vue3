name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: cd client && pnpm build

      - name: Build backend
        run: cd server && pnpm build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/dist
          mkdir -p deploy/public-dist
          cp -r server/dist/* deploy/dist/
          cp -r server/public-dist/* deploy/public-dist/
          cp server/package.json deploy/
          cp server/pnpm-lock.yaml deploy/

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/*"
          target: "~/webrtc-stream"
          strip_components: 1

      - name: Install dependencies and restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 加载用户环境
            export PATH="$HOME/.local/share/pnpm:$PATH"
            export PATH="$HOME/.npm-global/bin:$PATH"
            
            cd ~/webrtc-stream
            
            # 安装依赖（使用完整路径）
            $HOME/.local/share/pnpm/pnpm install --prod
            
            # 复制证书（使用 sudo 解决权限问题）
            sudo cp ~/certs/cert.pem .
            sudo cp ~/certs/key.pem .
            sudo chown $USER:$USER cert.pem key.pem
            
            # 启动/重启服务
            $HOME/.npm-global/bin/pm2 restart webrtc-signaling || $HOME/.npm-global/bin/pm2 start dist/index.js --name webrtc-signaling
            $HOME/.npm-global/bin/pm2 save

      - name: Cleanup
        run: rm -rf deploy
